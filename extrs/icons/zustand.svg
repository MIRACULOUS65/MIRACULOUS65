<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Zustand">
<title>Zustand</title>
<style>
@keyframes zu-stack {0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)}}
.zu-box{fill:#8b5e3c}
.b1{animation:zu-stack 1.6s ease-in-out infinite}
.b2{animation:zu-stack 1.6s ease-in-out infinite .2s}
.b3{animation:zu-stack 1.6s ease-in-out infinite .4s}
</style>
<rect class="zu-box b3" x="30" y="60" width="40" height="14" rx="2"/>
<rect class="zu-box b2" x="34" y="42" width="32" height="14" rx="2"/>
<rect class="zu-box b1" x="38" y="24" width="24" height="14" rx="2"/>
</svg>
