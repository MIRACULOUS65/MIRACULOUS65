<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="HTML5">
<title>HTML5</title>
<style>
@keyframes html5-flicker {0%,100%{transform:scale(1) rotate(0deg)} 25%{transform:scale(1.08) rotate(-2deg)} 50%{transform:scale(.96) rotate(2deg)} 75%{transform:scale(1.05) rotate(-1deg)}}
.html5-s{fill:#E34F26;transform-box:fill-box;transform-origin:bottom center;animation:html5-flicker .9s ease-in-out infinite}
</style>
