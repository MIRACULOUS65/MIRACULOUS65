<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Socket.io">
<title>Socket.io</title>
<style>
@keyframes sock-ripple { 0%{r:6;opacity:1} 100%{r:38;opacity:0} }
.sock-ring{fill:none;stroke:#000;stroke-width:3;animation:sock-ripple 1.8s ease-out infinite}
.sock-ring2{animation-delay:.6s}
.sock-ring3{animation-delay:1.2s}
</style>
<circle cx="50" cy="50" r="7" fill="#000"/>
<circle class="sock-ring sock-ring1" cx="50" cy="50" r="6"/>
<circle class="sock-ring sock-ring2" cx="50" cy="50" r="6"/>
<circle class="sock-ring sock-ring3" cx="50" cy="50" r="6"/>
</svg>
