<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Express.js">
<title>Express.js</title>
<style>
@keyframes ex-slide { 0%{transform:translateX(-30px);opacity:0} 60%{transform:translateX(0);opacity:1} 100%{transform:translateX(0);opacity:1} }
.ex-track{fill:none;stroke:#4a4a4a;stroke-width:3;stroke-dasharray:4 4}
.ex-car{animation:ex-slide 1.6s ease-out infinite}
</style>
<line class="ex-track" x1="18" y1="50" x2="82" y2="50"/>
<g class="ex-car">
<rect x="18" y="42" width="20" height="16" rx="3" fill="#fff"/>
<circle cx="24" cy="60" r="4" fill="#333"/>
<circle cx="34" cy="60" r="4" fill="#333"/>
</g>
</svg>
