<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="REST APIs">
<title>REST APIs</title>
<style>
@keyframes rest-ping { 0%{transform:translateX(0);opacity:1} 45%{transform:translateX(36px);opacity:1} 50%{opacity:0} 51%{transform:translateX(0);opacity:0} 55%{opacity:1} 100%{transform:translateX(0);opacity:1} }
.rest-node{fill:#FF6C37}
.rest-packet{fill:#fff;animation:rest-ping 1.8s ease-in-out infinite}
</style>
<circle class="rest-node" cx="22" cy="50" r="10"/>
<circle class="rest-node" cx="78" cy="50" r="10"/>
<circle class="rest-packet" cx="30" cy="50" r="5"/>
</svg>
