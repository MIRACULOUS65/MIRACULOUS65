<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Redux">
<title>Redux</title>
<style>
@keyframes redux-draw { 0%{stroke-dashoffset:180;opacity:.3} 50%{stroke-dashoffset:0;opacity:1} 100%{stroke-dashoffset:-180;opacity:.3} }
.redux-s{fill:none;stroke:#764ABC;stroke-width:5;stroke-linecap:round;stroke-dasharray:180;stroke-dashoffset:180;animation:redux-draw 2.4s ease-in-out infinite}
</style>
