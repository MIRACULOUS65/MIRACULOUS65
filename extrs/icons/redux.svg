<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Redux">
<title>Redux</title>
<style>
@keyframes redux-orbit { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.redux-core{fill:#764ABC}
.redux-orbit{fill:none;stroke:#764ABC;stroke-width:4;transform-box:fill-box;transform-origin:center}
.o1{animation:redux-orbit 2.4s linear infinite}
.o2{animation:redux-orbit 2.4s linear infinite reverse}
.o3{animation:redux-orbit 3s linear infinite}
</style>
<circle class="redux-core" cx="50" cy="50" r="8"/>
<ellipse class="redux-orbit o1" cx="50" cy="50" rx="32" ry="14"/>
<ellipse class="redux-orbit o2" cx="50" cy="50" rx="32" ry="14" transform="rotate(60 50 50)"/>
<ellipse class="redux-orbit o3" cx="50" cy="50" rx="32" ry="14" transform="rotate(-60 50 50)"/>
</svg>
