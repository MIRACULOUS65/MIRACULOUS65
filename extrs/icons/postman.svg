<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Postman">
<title>Postman</title>
<style>
@keyframes pm-sweep { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.pm-ring{fill:none;stroke:#FF6C37;stroke-width:5}
.pm-sweep{stroke:#FF6C37;stroke-width:4;transform-box:fill-box;transform-origin:center;animation:pm-sweep 1.2s linear infinite}
</style>
<circle class="pm-ring" cx="50" cy="50" r="28"/>
<line class="pm-sweep" x1="50" y1="50" x2="50" y2="24"/>
</svg>
