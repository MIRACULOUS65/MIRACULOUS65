<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Postman">
<title>Postman</title>
<style>
@keyframes pm-draw { 0%{stroke-dashoffset:220;opacity:.3} 50%{stroke-dashoffset:0;opacity:1} 100%{stroke-dashoffset:-220;opacity:.3} }
.pm-s{fill:none;stroke:#FF6C37;stroke-width:5;stroke-linecap:round;stroke-dasharray:220;stroke-dashoffset:220;animation:pm-draw 2.4s ease-in-out infinite}
</style>
<circle class="pm-s" cx="42" cy="42" r="24"/>
<path class="pm-s" d="M58 58l22 22" style="animation-delay:.3s"/>
</svg>
