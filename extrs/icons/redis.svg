<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Redis">
<title>Redis</title>
<style>
@keyframes redis-shift {0%,100%{transform:translateX(0)} 50%{transform:translateX(8px)}}
.redis-l{fill:#DC382D}
.l1{animation:redis-shift 1.4s ease-in-out infinite}
.l2{animation:redis-shift 1.4s ease-in-out infinite .25s;animation-direction:alternate-reverse}
.l3{animation:redis-shift 1.4s ease-in-out infinite .5s}
</style>
<ellipse class="redis-l l1" cx="50" cy="30" rx="26" ry="9"/>
<ellipse class="redis-l l2" cx="50" cy="50" rx="26" ry="9"/>
<ellipse class="redis-l l3" cx="50" cy="70" rx="26" ry="9"/>
</svg>
