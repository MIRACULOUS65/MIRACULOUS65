<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Redis">
<title>Redis</title>
<style>
@keyframes redis-ani {
  0% { stroke-dashoffset: -176; }
  50% { stroke-dashoffset: 0; }
  100% { stroke-dashoffset: 176; }
}
.redis-ellipse {
  fill: none;
  stroke: #DC382D;
  stroke-miterlimit: 10;
  stroke-width: 3px;
  stroke-dasharray: 176;
  stroke-dashoffset: -176;
  animation: redis-ani 0.7s infinite ease-in-out;
  opacity: 1;
}
.redis-ellipse-2 {
  transform-origin: 50px 50px;
  transform: rotate(57deg);
  animation-delay: 0.1s;
}
.redis-ellipse-3 {
  transform-origin: 50px 50px;
  transform: rotate(123deg);
  animation-delay: 0.2s;
}
</style>
<ellipse class="redis-ellipse" cx="50" cy="50" rx="40" ry="12"/>
<ellipse class="redis-ellipse redis-ellipse-2" cx="50" cy="50" rx="40" ry="12"/>
<ellipse class="redis-ellipse redis-ellipse-3" cx="50" cy="50" rx="40" ry="12"/>
</svg>