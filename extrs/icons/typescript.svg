<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="TypeScript">
<title>TypeScript</title>
<style>
@keyframes ts-blink {0%,50%{opacity:1} 51%,100%{opacity:0}}
.ts-sq{fill:#3178C6}
.ts-letter{fill:#fff;font-family:monospace;font-size:34px;font-weight:bold}
.ts-cursor{fill:#fff;animation:ts-blink 1s step-end infinite}
</style>
<rect class="ts-sq" x="18" y="18" width="64" height="64" rx="8"/>
<text class="ts-letter" x="27" y="65">TS</text>
<rect class="ts-cursor" x="70" y="38" width="6" height="26"/>
</svg>
