<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="TypeScript">
<title>TypeScript</title>
<style>
@keyframes ts-draw { 0%{stroke-dashoffset:200;opacity:.35} 50%{stroke-dashoffset:0;opacity:1} 100%{stroke-dashoffset:-200;opacity:.35} }
.ts-s{fill:none;stroke:#3178C6;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:200;stroke-dashoffset:200;animation:ts-draw 2.4s ease-in-out infinite}
</style>
<rect class="ts-s" x="20" y="20" width="60" height="60" rx="6"/>
<path class="ts-s" d="M34 40h16 M42 40v22" style="animation-delay:.3s"/>
</svg>
