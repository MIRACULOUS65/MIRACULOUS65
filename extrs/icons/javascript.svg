<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="JavaScript">
<title>JavaScript</title>
<style>
@keyframes js-draw { 0%{stroke-dashoffset:200;opacity:.35} 50%{stroke-dashoffset:0;opacity:1} 100%{stroke-dashoffset:-200;opacity:.35} }
.js-s{fill:none;stroke:#F7DF1E;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:200;stroke-dashoffset:200;animation:js-draw 2.4s ease-in-out infinite}
</style>
<rect class="js-s" x="20" y="20" width="60" height="60" rx="6"/>
<path class="js-s" d="M42 62c0 6 4 8 8 8s8-2 8-8V38" style="animation-delay:.3s"/>
</svg>
