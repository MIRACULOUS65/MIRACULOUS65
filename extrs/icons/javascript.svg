<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="JavaScript">
<title>JavaScript</title>
<style>
@keyframes js-bounce {0%{transform:translateY(0)}30%{transform:translateY(-20px)}55%{transform:translateY(0)}70%{transform:translateY(-8px)}85%{transform:translateY(0)}100%{transform:translateY(0)}}
.js-sq{fill:#F7DF1E}
.js-ball{fill:#111;animation:js-bounce 1.4s cubic-bezier(.5,0,.5,1) infinite}
</style>
<rect class="js-sq" x="18" y="18" width="64" height="64" rx="8"/>
<circle class="js-ball" cx="50" cy="60" r="7"/>
</svg>
