<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Vite">
<title>Vite</title>
<style>
@keyframes vite-draw { 0%{stroke-dashoffset:180;opacity:.35} 50%{stroke-dashoffset:0;opacity:1} 100%{stroke-dashoffset:-180;opacity:.35} }
.vite-s{fill:none;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:180;stroke-dashoffset:180;animation:vite-draw 2.2s ease-in-out infinite}
