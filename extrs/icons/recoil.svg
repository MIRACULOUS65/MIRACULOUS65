<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Recoil">
<title>Recoil</title>
<style>
@keyframes recoil-orbit { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes recoil-glow {0%,100%{r:5} 50%{r:9}}
.recoil-path{fill:none;stroke:#3578E5;stroke-width:3;transform-box:fill-box;transform-origin:center;animation:recoil-orbit 2.2s linear infinite}
.recoil-e{fill:#3578E5;animation:recoil-glow 1.1s ease-in-out infinite}
</style>
<ellipse class="recoil-path" cx="50" cy="50" rx="34" ry="14"/>
<circle class="recoil-e" cx="84" cy="50" r="5"/>
</svg>
