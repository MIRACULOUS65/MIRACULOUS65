<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="C++">
<title>C++</title>
<style>
@keyframes cpp-pulse {0%,100%{transform:scale(1);opacity:.6} 50%{transform:scale(1.35);opacity:1}}
.cpp-arc{fill:none;stroke:#00599C;stroke-width:8;stroke-linecap:round}
.cpp-plus{stroke:#00599C;stroke-width:4;stroke-linecap:round;transform-box:fill-box;transform-origin:center;animation:cpp-pulse 1.1s ease-in-out infinite}
.cpp-plus2{animation-delay:.35s}
</style>
<path class="cpp-arc" d="M60 26A28 28 0 1 0 60 74"/>
<g class="cpp-plus"><path d="M74 42v14M67 49h14"/></g>
<g class="cpp-plus cpp-plus2"><path d="M90 42v14M83 49h14"/></g>
</svg>
